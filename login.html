<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Iniciar Sesión - Anime World</title>

<body style="

<h1 style="color:#4da6ff;">

</h1>

<form action="php/login.php" method="POST">

<input
type="text"
name="usuario"

type="password"

border-radius:15px;
border:none;">

<input
type="submit"
value="Entrar"
style="
padding:12px;
width:150px;

border-radius:20px;

color:white;

<br>
